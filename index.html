      #ldr {
        position: fixed;
        inset: 0;
        z-index: 300;
        background: #0a0a0a;
        display: flex;

        align-items: center;
        justify-content: center;
        gap: 28px;
        transition: opacity 0.55s cubic-bezier(0.62, 0.05, 0.01, 0.99), visibility 0.55s;
      }
      #ldr.done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #ldr img {
        width: 78px;
        height: auto;
      }
      #ldr .line {
        width: 170px;
        height: 1px;
        background: rgba(255, 255, 255, 0.16);
        overflow: hidden;
      }
      #ldr .fill {
        height: 100%;
        width: 0;
        background: linear-gradient(108deg, #10d9af, #4f6bf0, #8b3df2, #e0399c, #fb8d5c);
        transition: width 1.1s cubic-bezier(0.62, 0.05, 0.01, 0.99);
      }
      #ldr .word {
        font-family: 'IBM Plex Mono', ui-monospace, monospace;

        letter-spacing: 0.18em;
        text-transform: uppercase;

  <body>
    <div id="ldr" aria-hidden="true">
      <img src="/favicon.png" alt="" />
      <div class="line"><div class="fill" id="ldr-fill"></div></div>
      <span class="word" id="ldr-word">Distilling</span>
    </div>
    <script>
      (function () {
        var ldr = document.getElementById('ldr')
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          ldr.remove()
          return
        }
        document.body.style.overflow = 'hidden'
        var words = ['Distilling', 'Synthesizing', 'Catalyzing']
        var wordEl = document.getElementById('ldr-word')
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            document.getElementById('ldr-fill').style.width = '100%'
          })
        })
        var i = 0
        var iv = setInterval(function () {
          i++
          if (i < words.length) wordEl.textContent = words[i]
        }, 420)
        setTimeout(function () {
          clearInterval(iv)
          ldr.classList.add('done')
          document.body.style.overflow = ''
          setTimeout(function () {
            ldr.remove()
          }, 700)
        }, 1350)
      })()
    </script>
    <div id="root"></div>
  </body>
